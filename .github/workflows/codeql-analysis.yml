name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v1
        with:
          languages: 'javascript'
      - name: Autocomplete CodeQL
        uses: github/codeql-action/autocomplete@v1
      - name: Running CodeQL
        uses: github/codeql-action/run-full-detected-scan@v1
      - name: Upload CodeQL results
        uses: github/codeql-action/upload-results@v1