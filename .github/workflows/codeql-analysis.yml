name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  actions: write
  contents: read
  security-events: read

jobs:
  analyze:
    name: "Analyze"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v2

      - name: "Set up CodeQL"
        uses: github/codeql-action/setup@v2
        with:
          languages: ["python"]

      - name: "Autobuild"
        uses: github/codeql-action/autobuild@v2

      - name: "Run CodeQL"
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"
          upload: true