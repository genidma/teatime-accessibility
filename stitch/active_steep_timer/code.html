<span class="font-bold tracking-widest text-xs uppercase">Deep Work Mode</span>
</div>

<div class="timer-font text-[6rem] md:text-[10rem] font-black leading-none tracking-tighter text-on-surface mb-8">

<p class="text-on-surface-variant text-sm mt-2 opacity-70">Focus on breath and presence.</p>

<p class="text-on-surface-variant text-sm mt-2 opacity-70">Acknowledge the positive now.</p>
