name: teatime-accessibility
base: core24
version: '1.3.6'
summary: Accessible Tea Timer
description: |
  A GUI based timer application for the Ubuntu (Desktop) environment.
  Features include:
  - Large, clear display
  - High contrast mode
  - Font scaling options
  - Customizable animations
  - Statistics tracking

grade: stable
confinement: strict
title: Tea Time Accessibility
contact: https://github.com/genidma/teatime-accessibility
license: GPL-3.0
website: https://github.com/genidma/teatime-accessibility
issues: https://github.com/genidma/teatime-accessibility/issues
source-code: https://github.com/genidma/teatime-accessibility

apps:
  teatime-accessibility:
    command: bin/teatime.py
    extensions: [gnome]
    plugs:
      - audio-playback
      - home
      - desktop
      - desktop-legacy
      - unity7
      - wayland
      - x11

parts:
  teatime:
    plugin: dump
    source: ..             # Go up to the root
    source-depth: 1        # ONLY look at the top layer (prevents the crash loop)
    source-filter:         # ONLY take the bin folder, ignore the rest
      - bin/*
    override-build: |
      craftctl default
      chmod +x $CRAFT_PART_INSTALL/bin/teatime.py  
    python-packages:
      - -r requirements.txt
    stage:
      - bin
      - lib
      - share
      - etc
